  # H100 vanilla Spot — us-central1 multi-zone (13% of CONUS H100 vanilla pool;
  # in-region for /home Filestore affinity but lowest H100 vanilla share).
  - id: h100_spot_central
    source: community/modules/compute/schedmd-slurm-gcp-v6-nodeset
    use: [default_vpc_central, a3_startup]
    settings:
      bandwidth_tier: gvnic_enabled
      machine_type: a3-highgpu-8g
      region: us-central1
      zone: us-central1-a
      zones: [us-central1-b, us-central1-c]
      enable_public_ips: false
      enable_shielded_vm: true
      shielded_instance_config:
        # Secure Boot disabled because the Managed Lustre client kernel module
        # (lustre-client-modules-6.8.0-1047-gcp from us-apt.pkg.dev) isn't
        # signed against Ubuntu's Secure Boot Microsoft-cert chain — modprobe
        # fails with "Key was rejected by service". vTPM + integrity-monitoring
        # still satisfy compute.requireShieldedVm org policy; image build
        # provenance + immutable Cloud Audit Logs cover the boot-integrity
        # gap. Re-enable Secure Boot once we sign the Lustre module with a
        # MOK key embedded in the Packer build.
        enable_secure_boot: false
        enable_vtpm: true
        enable_integrity_monitoring: true
      enable_oslogin: true
      node_count_static: 0
      node_count_dynamic_max: 1
      enable_placement: false
      disk_type: hyperdisk-balanced
      on_host_maintenance: TERMINATE
      enable_spot_vm: true
      spot_instance_config:
        termination_action: STOP
      node_conf:
        Feature: h100,gpu
        Weight: 11

  # =========================================================================
  # Single partition `gpu`. Researchers `sbatch -p gpu script.sh`.
  # Priority: admin-provisioned active reservations (Calendar/Flex) at top
  # (added by hand as cron fulfills them), then Spot fan-out by share-of-pool.
  # =========================================================================
  - id: gpu_partition
    source: community/modules/compute/schedmd-slurm-gcp-v6-partition
    use:
    # ─── (1) Admin-provisioned active reservations — add as cron fulfills ──
    # When calendar-poll.sh books a Calendar FR named my-cal-XXX, define a new
    # nodeset block above with `reservation_name: my-cal-XXX` and uncomment its
    # entry here. Same for Flex (flex-poll.sh) once a window fulfills.
    # Example:
    #   - h200_calendar_active_central1b
    #   - h200_flex_active_southb
    #
    # ─── (2) H200 Spot fan-out — Slurm Weight 1-4 (lower = higher prio) ───
    - h200_spot_southb       # W1 — us-south1-b, 76% of CONUS H200 Spot free pool
    - h200_spot_west1c       # W2 — us-west1-c, 3% (only other zone with non-zero free today)
    - h200_spot_central1b    # W3 — us-central1-b, in-region + RDMA-capable
    - h200_spot_east4b       # W4 — us-east4-b, 0% currently
    # ─── (3a) H100 Mega Spot — degraded fallback (same 80GB GPU class) ─────
    - h100mega_spot_central  # W5 — us-central1-{a,b,c}, 60% of CONUS Mega free pool
    - h100mega_spot_west1    # W6 — us-west1-{a,b}, 27%
    - h100mega_spot_east4    # W7 — us-east4-{a,b,c}, 6%
    # ─── (3b) H100 vanilla Spot — final GPU-class resort, ordered by share ─
    - h100_spot_east4        # W8  — us-east4-{a,b}, 35% of CONUS H100 vanilla pool
    - h100_spot_west1        # W9  — us-west1-{a,b}, 28%
    - h100_spot_east5        # W10 — us-east5-a, 20%
    - h100_spot_central      # W11 — us-central1-{a,b,c}, 13% (in-region but smallest share)
    settings:
      exclusive: false
      partition_name: gpu
      is_default: true
      partition_conf:
        OverSubscribe: EXCLUSIVE
        ResumeTimeout: 1800   # 30 min — covers a3 first-boot (Lustre kmod, NVIDIA driver,
                              # slurm-gcp setup.py, GCS-FUSE mount).
        SuspendTimeout: 1800

  - id: slurm_login
    source: community/modules/scheduler/schedmd-slurm-gcp-v6-login
    use: [default_vpc_central]
    settings:
      disk_size_gb: 200
      enable_login_public_ips: false
      machine_type: n2-standard-4
      enable_shielded_vm: true
      shielded_instance_config:
        # Secure Boot disabled because the Managed Lustre client kernel module
        # (lustre-client-modules-6.8.0-1047-gcp from us-apt.pkg.dev) isn't
        # signed against Ubuntu's Secure Boot Microsoft-cert chain — modprobe
        # fails with "Key was rejected by service". vTPM + integrity-monitoring
        # still satisfy compute.requireShieldedVm org policy; image build
        # provenance + immutable Cloud Audit Logs cover the boot-integrity
        # gap. Re-enable Secure Boot once we sign the Lustre module with a
        # MOK key embedded in the Packer build.
        enable_secure_boot: false
        enable_vtpm: true
        enable_integrity_monitoring: true
      enable_oslogin: true

  - id: slurm_controller
    source: community/modules/scheduler/schedmd-slurm-gcp-v6-controller
    use:
    - default_vpc_central
    - gpu_partition
    - slurm_login
    - homefs
    - managed_lustre_scratch
    - gcs_bucket
    settings:
      enable_controller_public_ips: false
      disk_type: pd-ssd
      disk_size_gb: 200
      machine_type: n2-standard-16
      enable_external_prolog_epilog: true
      enable_shielded_vm: true
      shielded_instance_config:
        # Secure Boot disabled because the Managed Lustre client kernel module
        # (lustre-client-modules-6.8.0-1047-gcp from us-apt.pkg.dev) isn't
        # signed against Ubuntu's Secure Boot Microsoft-cert chain — modprobe
        # fails with "Key was rejected by service". vTPM + integrity-monitoring
        # still satisfy compute.requireShieldedVm org policy; image build
        # provenance + immutable Cloud Audit Logs cover the boot-integrity
        # gap. Re-enable Secure Boot once we sign the Lustre module with a
        # MOK key embedded in the Packer build.
        enable_secure_boot: false
        enable_vtpm: true
        enable_integrity_monitoring: true
      enable_oslogin: true
