---

blueprint_name: wzslurm-img

vars:
  deployment_name: wzslurm-img
  project_id: wz-slurm
  region: us-central1
  zone: us-central1-b
  base_image:
    project: ubuntu-os-accelerator-images
    image: ubuntu-accelerator-2204-amd64-with-nvidia-570-v20260210
  image_build_machine_type: n2-standard-16
  build_slurm_from_git_ref: 6.12.1
  instance_image:
    project: $(vars.project_id)
    family: $(vars.deployment_name)-u22
  disk_size_gb: 100
  base_network_name: $(vars.deployment_name)

deployment_groups:
- group: image-env
  modules:
  - id: slurm-image-network
    source: modules/network/vpc
    settings:
      network_name: $(vars.base_network_name)-net

  - id: slurm-build-script
    source: modules/scripts/startup-script
    settings:
      install_ansible: true
      enable_gpu_network_wait_online: true
      docker:
        enabled: true
        world_writable: true
      runners:
      - type: data
        destination: /etc/apt/preferences.d/block-broken-nvidia-container
        content: |
          Package: nvidia-container-toolkit nvidia-container-toolkit-base libnvidia-container-tools libnvidia-container1
          Pin: version 1.17.7-1
          Pin-Priority: 100

      # The following holds NVIDIA software that was already installed on the
      # accelerator base image to be the same driver version. This reduces the
      # risk of a driver version mismatch.
      # Additional packages are held by:
      # https://github.com/GoogleCloudPlatform/slurm-gcp/blob/master/ansible/group_vars/os_ubuntu.yml
      - type: ansible-local
        destination: hold-nvidia-packages.yml
        content: |
          ---
          - name: Hold nvidia packages
            hosts: all
            become: true
            vars:
              nvidia_packages_to_hold:
              - libnvidia-cfg1-*-server
              - libnvidia-compute-*-server
              - libnvidia-nscq-*
              - nvidia-compute-utils-*-server
              - nvidia-fabricmanager-*
              - nvidia-utils-*-server
              - nvidia-imex-*
            tasks:
            - name: Hold nvidia packages
              ansible.builtin.command:
                argv:
                - apt-mark
                - hold
                - "{{ item }}"
              loop: "{{ nvidia_packages_to_hold }}"

      - type: data
        destination: /var/tmp/slurm_vars.json
        content: |
          {
            "reboot": false,
            "install_cuda": false,
            "install_gcsfuse": true,
            "install_lustre": false,
            "install_managed_lustre": true,
            "install_nvidia_repo": true,
            "install_ompi": true,
            "allow_kernel_upgrades": false,
            "monitoring_agent": "cloud-ops",
          }
      - type: shell
        destination: install_slurm.sh
        content: |
          #!/bin/bash
          set -e -o pipefail
          ansible-pull \
              -U https://github.com/GoogleCloudPlatform/slurm-gcp -C $(vars.build_slurm_from_git_ref) \
              -i localhost, --limit localhost --connection=local \
              -e @/var/tmp/slurm_vars.json \
              ansible/playbook.yml
      # this duplicates the ulimits configuration of the HPC VM Image
      - type: data
        destination: /etc/security/limits.d/99-unlimited.conf
        content: |
          * - memlock unlimited
          * - nproc unlimited
          * - stack unlimited
          * - nofile 1048576
          * - cpu unlimited
          * - rtprio unlimited
      - type: shell
        destination: install-cuda-toolkit.sh
        content: |
          #!/bin/bash
          set -e -o pipefail
          add-nvidia-repositories -y
          apt install -y \
              cuda-toolkit-12-8 \
              datacenter-gpu-manager-4-cuda12=1:4.5.2-1 \
              datacenter-gpu-manager-4-dev=1:4.5.2-1 \
              datacenter-gpu-manager-4-core=1:4.5.2-1

          # 2. Hold ALL components
          apt-mark hold \
              datacenter-gpu-manager-4-cuda12 \
              datacenter-gpu-manager-4-dev \
              datacenter-gpu-manager-4-core

      - type: ansible-local
        destination: settings_nvidia_dcgm.yml
        content: |
          ---
          - name: Nvidia and DGMA settings
            hosts: all
            become: true
            tasks:
            - name: Reduce NVIDIA repository priority
              ansible.builtin.copy:
                dest: /etc/apt/preferences.d/cuda-repository-pin-600
                mode: 0o0644
                owner: root
                group: root
                content: |
                  Package: *
                  Pin: release l=NVIDIA CUDA
                  Pin-Priority: 400
            - name: Create nvidia-persistenced override directory
              ansible.builtin.file:
                path: /etc/systemd/system/nvidia-persistenced.service.d
                state: directory
                owner: root
                group: root
                mode: 0o755
            - name: Configure nvidia-persistenced override
              ansible.builtin.copy:
                dest: /etc/systemd/system/nvidia-persistenced.service.d/persistence_mode.conf
                owner: root
                group: root
                mode: 0o644
                content: |
                  [Service]
                  ExecStart=
                  ExecStart=/usr/bin/nvidia-persistenced --user nvidia-persistenced --verbose
              notify: Reload SystemD
            handlers:
            - name: Reload SystemD
              ansible.builtin.systemd:
                daemon_reload: true
            post_tasks:
            - name: Disable NVIDIA DCGM by default (enable during boot on GPU nodes)
              ansible.builtin.service:
                name: nvidia-dcgm.service
                state: stopped
                enabled: false
            - name: Disable nvidia-persistenced SystemD unit (enable during boot on GPU nodes)
              ansible.builtin.service:
                name: nvidia-persistenced.service
                state: stopped
                enabled: false

      - type: ansible-local
        destination: install_ibverbs_utils.yml
        content: |
          ---
          - name: Install ibverbs-utils
            hosts: all
            become: true
            tasks:
            - name: Install Linux Modules Extra
              ansible.builtin.package:
                name:
                - ibverbs-utils
                state: present

      # ----------------------------------------------------------------------
      # Enroot + Pyxis — SLURM container support. Researchers reference
      # Artifact Registry-hosted images via `srun --container-image=...`;
      # Pyxis (SPANK plugin) invokes Enroot to pull, unpack, and run
      # unprivileged containers. Cache lives on /mnt/localssd (per-node SSD,
      # mounted by cluster.yaml's a3_startup). Docker credential helper for
      # Artifact Registry is system-wide.
      # ----------------------------------------------------------------------
      - type: ansible-local
        destination: install_enroot_pyxis.yml
        content: |
          ---
          - name: Install Enroot + Pyxis for SLURM container support
            hosts: all
            become: true
            vars:
              enroot_version: "3.5.0"
              pyxis_version: "0.20.0"
              slurm_lib_dir: /usr/local/lib/slurm
              slurm_etc_dir: /usr/local/etc/slurm
            tasks:
            - name: Install Enroot + Pyxis build deps
              ansible.builtin.apt:
                name:
                - curl
                - jq
                - squashfs-tools
                - parallel
                - libcap2-bin
                - libtool
                - automake
                - autoconf
                - make
                - gcc
                - pkg-config
                - git
                - fuse-overlayfs
                state: present
                update_cache: yes
            - name: Download Enroot deb
              ansible.builtin.get_url:
                url: "https://github.com/NVIDIA/enroot/releases/download/v{{ enroot_version }}/enroot_{{ enroot_version }}-1_amd64.deb"
                dest: /tmp/enroot.deb
                mode: '0644'
            - name: Download Enroot+caps deb (unprivileged container support)
              ansible.builtin.get_url:
                url: "https://github.com/NVIDIA/enroot/releases/download/v{{ enroot_version }}/enroot+caps_{{ enroot_version }}-1_amd64.deb"
                dest: /tmp/enroot-caps.deb
                mode: '0644'
            - name: Install Enroot debs
              ansible.builtin.apt:
                deb: "{{ item }}"
              loop:
              - /tmp/enroot.deb
              - /tmp/enroot-caps.deb
            - name: Clone Pyxis source
              ansible.builtin.git:
                repo: https://github.com/NVIDIA/pyxis.git
                dest: /tmp/pyxis
                version: "v{{ pyxis_version }}"
            - name: Build + install Pyxis SPANK plugin against slurm-gcp's libslurm
              ansible.builtin.shell:
                cmd: |
                  set -e
                  cd /tmp/pyxis
                  make CPPFLAGS="-I/usr/local/include" prefix=/usr/local
                  make install prefix=/usr/local
                creates: "{{ slurm_lib_dir }}/spank_pyxis.so"
            - name: Ensure plugstack.conf.d exists
              ansible.builtin.file:
                path: "{{ slurm_etc_dir }}/plugstack.conf.d"
                state: directory
                mode: '0755'
            - name: Drop pyxis plugstack entry
              ansible.builtin.copy:
                dest: "{{ slurm_etc_dir }}/plugstack.conf.d/pyxis.conf"
                content: |
                  required {{ slurm_lib_dir }}/spank_pyxis.so
                mode: '0644'
            - name: Ensure plugstack.conf master file includes plugstack.conf.d
              ansible.builtin.copy:
                dest: "{{ slurm_etc_dir }}/plugstack.conf"
                content: |
                  include {{ slurm_etc_dir }}/plugstack.conf.d/*
                mode: '0644'
            - name: Install gcloud Docker credential helper (auths Enroot to Artifact Registry)
              ansible.builtin.apt:
                name:
                - google-cloud-cli-docker-credential-gcr
                state: present
                update_cache: yes
              ignore_errors: true
            - name: Ensure /etc/skel/.docker and /root/.docker exist BEFORE writing config.json
              ansible.builtin.file:
                path: "{{ item.path }}"
                state: directory
                mode: "{{ item.mode }}"
              loop:
              - { path: /etc/skel/.docker, mode: '0755' }
              - { path: /root/.docker,     mode: '0700' }
            - name: System-wide Docker client config — credHelpers for all CONUS Artifact Registry endpoints
              ansible.builtin.copy:
                dest: "{{ item }}"
                content: |
                  {
                    "credHelpers": {
                      "us-docker.pkg.dev": "gcloud",
                      "us-central1-docker.pkg.dev": "gcloud",
                      "us-east1-docker.pkg.dev": "gcloud",
                      "us-east4-docker.pkg.dev": "gcloud",
                      "us-east5-docker.pkg.dev": "gcloud",
                      "us-west1-docker.pkg.dev": "gcloud",
                      "us-south1-docker.pkg.dev": "gcloud"
                    }
                  }
                mode: '0644'
              loop:
              - /etc/skel/.docker/config.json
              - /root/.docker/config.json

      - type: data
        destination: /etc/enroot/enroot.conf
        content: |
          # Enroot runtime/cache/data on local SSD (mounted at /mnt/localssd by
          # cluster.yaml a3_startup). Per-UID subdirs so multiple researchers'
          # containers don't collide. ${HOME}/.config/enroot for user config
          # (auth, hooks); /mnt/localssd/${UID}/enroot for everything else.
          ENROOT_CONFIG_PATH      ${HOME}/.config/enroot
          ENROOT_RUNTIME_PATH     /mnt/localssd/${UID}/enroot/runtime
          ENROOT_CACHE_PATH       /mnt/localssd/${UID}/enroot/cache
          ENROOT_DATA_PATH        /mnt/localssd/${UID}/enroot/data
          ENROOT_TEMP_PATH        /mnt/localssd/${UID}/enroot

- group: image
  modules:
  - id: slurm-a3ultra-image
    source: modules/packer/custom-image
    kind: packer
    settings:
      disk_size: $(vars.disk_size_gb)
      machine_type: $(vars.image_build_machine_type)
      source_image: $(vars.base_image.image)
      source_image_project_id: [$(vars.base_image.project)]
      image_family: $(vars.instance_image.family)

      # Org-policy compliance for the BUILD VM (not the resulting image — the
      # image's runtime settings are in cluster.yaml's nodeset blocks):
      # - omit_external_ip: true → no public IP (compute.vmExternalIpAccess)
      # - use_iap: true (default) → Packer SSH via IAP through wzslurm-img-net
      # - use_os_login: true → Packer authenticates SSH via OS Login (the
      #   metadata enable-oslogin alone isn't enough; the Packer template has
      #   a separate use_os_login flag that defaults to false)
      # - enable_shielded_vm: true → Secure Boot ON for the build VM only
      #   (compute.requireShieldedVm). Build VM doesn't mount Lustre, so the
      #   Lustre kmod's MOK-signing gap doesn't bite here.
      omit_external_ip: true
      use_os_login: true
      enable_shielded_vm: true
      shielded_instance_config:
        enable_secure_boot: true
        enable_vtpm: true
        enable_integrity_monitoring: true

      # Unattended upgrades are disabled in this blueprint so that software does not
      # get updated daily and lead to potential instability in the cluster environment.
      #
      # Unattended Upgrades installs available security updates from the Ubuntu
      # security pocket for installed packages daily by default. Administrators who
      # disable this feature assume all responsibility for manually reviewing and
      # patching their systems against vulnerabilities.
      #
      # To enable unattended upgrades, please remove this section.
      metadata:
        enable-oslogin: "TRUE"
        user-data: |
          #cloud-config
          write_files:
          - path: /etc/apt/apt.conf.d/20auto-upgrades
            permissions: '0644'
            owner: root
            content: |
              APT::Periodic::Update-Package-Lists "0";
              APT::Periodic::Unattended-Upgrade "0";
    use:
    - slurm-image-network
    - slurm-build-script

